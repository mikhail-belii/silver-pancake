spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: silverpancake
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/silverpancake_db}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      ddl-auto: none
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  errors:
    user-not-found: Пользователь не найден
    file-not-found: Файл не найден
    course-not-found: Курс не найден

    invalid-access-token: Токен доступа некорректный или истек
    invalid-refresh-token: Токен обновления некорректный или истек
    user-with-email-exists: Пользователь с такой почтой уже зарегистрирован
    incorrect-email-or-password: Неверная почта или пароль
    file-empty: Файл пустой
    file-failed-save: Не удалось сохранить файл
    file-failed-retrieve: Не удалось получить файл
    file-size: Размер файла должен быть меньше или равен 10 МБ
    file-extension-required: Файл должен иметь расширение
    file-allowed-extensions: "Разрешенные расширения файла: txt, pdf, docx, png, jpg"
    generate-code-failed: Не удалось сгенерировать код присоединения. Попробуйте еще раз
    security: У вас недостаточно прав для выполнения этого действия
    user-not-course-member: Вы не являетесь участником курса

jwt:
  secret:
    access: dmVyeS1zdHJvbmctc2VjcmV0LWZvci1hY2Nlc3MtdG9rZW4tMDAx
